<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀客服 - 管理后台</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --bg: #f0f9ff;
            --card: #ffffff;
            --text: #0c4a6e;
            --text-light: #64748b;
            --border: #bae6fd;
            --danger: #ef4444;
            --sidebar-width: 240px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: var(--bg);
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(180deg, #0c4a6e 0%, #075985 100%);
            color: white;
            padding: 20px 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .sidebar-header h1 { font-size: 20px; font-weight: 600; }
        .sidebar-header p { font-size: 12px; opacity: 0.7; margin-top: 4px; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255,255,255,0.7);
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .main {
            margin-left: var(--sidebar-width);
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-title { font-size: 24px; font-weight: 600; color: var(--text); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card, .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .card { margin-bottom: 24px; }
        .stat-label { font-size: 14px; color: var(--text-light); margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--text); }
        .card-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; color: var(--text-light); font-size: 13px; }
        td { font-size: 14px; color: var(--text); }
        tr:hover { background: var(--bg); }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            background: #e0f2fe;
            color: #075985;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: var(--danger); color: white; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--card);
            border-radius: 20px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
        .form-input, .form-textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }

        .form-textarea { min-height: 100px; resize: vertical; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .page-section { display: none; }
        .page-section.active { display: block; }

        .conversation-viewer {
            max-height: 400px;
            overflow-y: auto;
            padding: 16px;
            background: var(--bg);
            border-radius: 12px;
        }

        .msg-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .msg-bubble.user {
            background: var(--primary);
            color: white;
            margin-left: auto;
        }

        .msg-bubble.assistant {
            background: white;
            color: var(--text);
        }

        .msg-meta {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>灵犀客服</h1>
            <p>管理后台</p>
        </div>
        <div class="nav-item active" data-page="dashboard">📊 数据看板</div>
        <div class="nav-item" data-page="conversations">💬 对话管理</div>
        <div class="nav-item" data-page="faq">❓ FAQ 管理</div>
        <div class="nav-item" data-page="tools">🛠️ 工具统计</div>
    </div>

    <div class="main">
        <div class="page-section active" id="page-dashboard">
            <div class="page-header">
                <h2 class="page-title">数据看板</h2>
                <select id="statsPeriod" class="form-input" style="width: auto;">
                    <option value="7">最近 7 天</option>
                    <option value="30">最近 30 天</option>
                    <option value="90">最近 90 天</option>
                </select>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label">总对话数</div><div class="stat-value" id="statConversations">-</div></div>
                <div class="stat-card"><div class="stat-label">解决率</div><div class="stat-value" id="statResolutionRate">-</div></div>
                <div class="stat-card"><div class="stat-label">总消息数</div><div class="stat-value" id="statMessages">-</div></div>
                <div class="stat-card"><div class="stat-label">平均满意度</div><div class="stat-value" id="statSatisfaction">-</div></div>
            </div>

            <div class="card">
                <div class="card-title">🛠️ 工具使用统计</div>
                <table>
                    <thead><tr><th>工具名称</th><th>调用次数</th><th>占比</th></tr></thead>
                    <tbody id="toolStatsBody"></tbody>
                </table>
            </div>
        </div>

        <div class="page-section" id="page-conversations">
            <div class="page-header"><h2 class="page-title">对话管理</h2></div>
            <div class="card">
                <table>
                    <thead><tr><th>对话 ID</th><th>用户 ID</th><th>状态</th><th>开始时间</th><th>操作</th></tr></thead>
                    <tbody id="conversationsBody"></tbody>
                </table>
            </div>
        </div>

        <div class="page-section" id="page-faq">
            <div class="page-header">
                <h2 class="page-title">FAQ 管理</h2>
                <button class="btn btn-primary" onclick="openFaqModal()">➕ 添加 FAQ</button>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>ID</th><th>问题</th><th>分类</th><th>操作</th></tr></thead>
                    <tbody id="faqBody"></tbody>
                </table>
            </div>
        </div>

        <div class="page-section" id="page-tools">
            <div class="page-header"><h2 class="page-title">工具详情</h2></div>
            <div class="card"><p style="color: var(--text-light);">工具详细调用记录会在数据看板中展示。</p></div>
        </div>
    </div>

    <div class="modal-overlay" id="faqModal">
        <div class="modal">
            <div class="modal-title" id="faqModalTitle">添加 FAQ</div>
            <input type="hidden" id="faqId">
            <div class="form-group">
                <label class="form-label">问题</label>
                <input type="text" class="form-input" id="faqQuestion" placeholder="输入问题">
            </div>
            <div class="form-group">
                <label class="form-label">答案</label>
                <textarea class="form-textarea" id="faqAnswer" placeholder="输入答案"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">分类</label>
                <input type="text" class="form-input" id="faqCategory" placeholder="如：订单、退换货">
            </div>
            <div class="form-group">
                <label class="form-label">关键词（逗号分隔）</label>
                <input type="text" class="form-input" id="faqKeywords" placeholder="关键词1,关键词2">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeFaqModal()">取消</button>
                <button class="btn btn-primary" onclick="saveFaq()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="conversationModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-title">对话详情</div>
            <div class="conversation-viewer" id="conversationViewer"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeConversationModal()">关闭</button>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        const API_HEADERS = { "X-API-Key": "lingxi-api-key-change-me" };

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`page-${item.dataset.page}`).classList.add('active');
            });
        });

        async function loadStats(days = 7) {
            try {
                const res = await fetch(`${API}/analytics/stats?days=${days}`, { headers: API_HEADERS });
                const data = await res.json();
                document.getElementById('statConversations').textContent = data.total_conversations;
                document.getElementById('statResolutionRate').textContent = `${(data.resolution_rate * 100).toFixed(1)}%`;
                document.getElementById('statMessages').textContent = data.total_messages;
                document.getElementById('statSatisfaction').textContent = data.avg_satisfaction ? `${data.avg_satisfaction}/5` : 'N/A';

                const tbody = document.getElementById('toolStatsBody');
                const total = Object.values(data.tool_usage).reduce((a, b) => a + b, 0) || 1;
                tbody.innerHTML = Object.entries(data.tool_usage)
                    .sort((a, b) => b[1] - a[1])
                    .map(([name, count]) => `
                        <tr>
                            <td>${name}</td>
                            <td>${count}</td>
                            <td>${((count / total) * 100).toFixed(1)}%</td>
                        </tr>
                    `).join('');
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        async function loadFaqs() {
            try {
                const res = await fetch(`${API}/knowledge/faq`, { headers: API_HEADERS });
                const data = await res.json();
                const tbody = document.getElementById('faqBody');
                tbody.innerHTML = data.map(faq => `
                    <tr>
                        <td>${faq.id}</td>
                        <td>${faq.question}</td>
                        <td><span class="badge">${faq.category || '-'}</span></td>
                        <td>
                            <button class="btn btn-secondary" onclick="editFaq(${faq.id})" style="padding: 6px 12px; font-size: 12px;">编辑</button>
                            <button class="btn btn-danger" onclick="deleteFaq(${faq.id})" style="padding: 6px 12px; font-size: 12px;">删除</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Failed to load FAQs:', error);
            }
        }

        function openFaqModal(id = null) {
            document.getElementById('faqModal').classList.add('active');
            document.getElementById('faqModalTitle').textContent = id ? '编辑 FAQ' : '添加 FAQ';
            document.getElementById('faqId').value = id || '';
            if (!id) {
                document.getElementById('faqQuestion').value = '';
                document.getElementById('faqAnswer').value = '';
                document.getElementById('faqCategory').value = '';
                document.getElementById('faqKeywords').value = '';
            }
        }

        function closeFaqModal() {
            document.getElementById('faqModal').classList.remove('active');
        }

        async function editFaq(id) {
            try {
                const res = await fetch(`${API}/knowledge/faq`, { headers: API_HEADERS });
                const faqs = await res.json();
                const faq = faqs.find(item => item.id === id);
                if (!faq) return;
                document.getElementById('faqQuestion').value = faq.question;
                document.getElementById('faqAnswer').value = faq.answer;
                document.getElementById('faqCategory').value = faq.category || '';
                document.getElementById('faqKeywords').value = (faq.keywords || []).join(',');
                openFaqModal(id);
            } catch (error) {
                console.error('Failed to load FAQ:', error);
            }
        }

        async function saveFaq() {
            const id = document.getElementById('faqId').value;
            const data = {
                question: document.getElementById('faqQuestion').value,
                answer: document.getElementById('faqAnswer').value,
                category: document.getElementById('faqCategory').value || null,
                keywords: document.getElementById('faqKeywords').value.split(',').map(k => k.trim()).filter(Boolean)
            };

            try {
                const url = id ? `${API}/knowledge/faq/${id}` : `${API}/knowledge/faq`;
                const method = id ? 'PUT' : 'POST';
                await fetch(url, {
                    method,
                    headers: { ...API_HEADERS, "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                closeFaqModal();
                loadFaqs();
            } catch (error) {
                console.error('Failed to save FAQ:', error);
            }
        }

        async function deleteFaq(id) {
            if (!confirm('确定删除这条 FAQ 吗？')) return;
            try {
                await fetch(`${API}/knowledge/faq/${id}`, { method: 'DELETE', headers: API_HEADERS });
                loadFaqs();
            } catch (error) {
                console.error('Failed to delete FAQ:', error);
            }
        }

        function closeConversationModal() {
            document.getElementById('conversationModal').classList.remove('active');
        }

        document.getElementById('statsPeriod').addEventListener('change', (event) => {
            loadStats(parseInt(event.target.value, 10));
        });

        loadStats();
        loadFaqs();
    </script>
</body>
</html>
